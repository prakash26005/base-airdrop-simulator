<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Savver Base Airdrop Simulator • @8q</title>
  <meta name="description" content="Base Airdrop Simulator - Made by @8q">
  
  <!-- Ethers.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/5.7.2/ethers.umd.min.js"></script>
  <!-- HTML2Canvas -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    /* === PURA STYLE (same as before) === */
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --base-blue:#0052ff;--base-blue2:#1a6bff;--base-blue3:#4d8fff;--base-blue-dark:#0038b8;
      --bg:#06080f;--surface:rgba(255,255,255,.04);--surface2:rgba(255,255,255,.07);
      --border:rgba(255,255,255,.08);--border2:rgba(255,255,255,.15);--text:#ffffff;
      --text2:rgba(255,255,255,.65);--text3:rgba(255,255,255,.35);
      --teal:#00d4aa;--red:#ff5555;--amber:#ffb800;--r:14px;--r-sm:9px;
    }
    body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:14px}
    .hero{width:100%;height:220px;background:linear-gradient(180deg,rgba(6,8,15,.1) 0%,rgba(6,8,15,.85) 100%),url('https://i.imgur.com/8qBaseHero.jpg') center/cover no-repeat;display:flex;align-items:flex-end}
    .hero-inner{max-width:900px;margin:0 auto;padding:0 24px 28px;display:flex;align-items:flex-end;gap:18px}
    .base-logo-img{width:52px;height:52px;border-radius:12px;border:2px solid rgba(255,255,255,.2);box-shadow:0 0 24px rgba(0,82,255,.6)}
    .hero-text h1{font-size:26px;font-weight:800;letter-spacing:-.5px;line-height:1.1}
    .hero-text h1 em{color:#4d8fff;font-style:normal}
    .spec-pill{margin-left:auto;padding:5px 13px;border-radius:20px;background:rgba(255,184,0,.1);color:#ffb800;border:1px solid rgba(255,184,0,.3);font-size:11px;font-weight:600}

    .main{max-width:900px;margin:0 auto;padding:28px 20px 0}
    .search-card{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:20px;margin-bottom:20px}
    .addr-input{flex:1;background:rgba(255,255,255,.05);border:1px solid var(--border2);border-radius:9px;padding:12px 16px;font-family:'Space Mono',monospace;font-size:13px}
    .scan-btn{padding:12px 32px;background:#0052ff;color:#fff;border:none;border-radius:9px;font-weight:700;cursor:pointer;width:100%;max-width:320px}
    
    #results{display:none}
    .addr-strip{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 18px;margin-bottom:18px;display:flex;align-items:center;gap:12px}
    .score-block{background:var(--surface);border:1px solid var(--border2);border-radius:14px;padding:22px;margin-bottom:14px}
    .pts-big{font-size:52px;font-weight:800;background:linear-gradient(135deg,#fff,#4d8fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
    .m3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
    .mbox{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:12px;padding:15px;text-align:center}
    .mv{font-size:22px;font-weight:800}
    
    /* Cast & Mint Buttons */
    .action-btns{margin:30px 0;text-align:center}
    .action-btn{
      background:linear-gradient(90deg,#0052ff,#00d4aa);color:#fff;border:none;
      padding:16px 40px;font-size:18px;font-weight:700;border-radius:9999px;
      cursor:pointer;box-shadow:0 6px 20px rgba(0,212,170,.4);margin:8px;
    }
    .note{font-size:13px;color:#00d4aa;margin-top:8px}
  </style>
</head>
<body>

<div style="background:#000;color:#fff;padding:12px;text-align:center;font-size:17px;font-weight:700">
  🚀 Made by @8q • Base Airdrop Farmer
</div>

<div class="hero">… (same hero as before) …</div>

<div class="main">
  <!-- Search card same as before -->
  <div class="search-card">…</div>

  <div id="status" class="status"></div>
  <div id="steps" class="steps">…</div>

  <div id="results">
    <div class="addr-strip">…</div>

    <div class="tabs">…</div>

    <!-- SCORE PANE -->
    <div id="pane-score" class="pane on">
      <div class="crit-grid" id="crit-grid"></div>
      <div id="pen-wrap"></div>
      <div class="score-block">
        <div class="pts-row">
          <div><span class="pts-big" id="pts-big">0</span><span class="pts-den">/15 pts</span></div>
          <div class="pts-info" id="pts-info"></div>
        </div>
        <div class="bar-track"><div class="bar-fill" id="pts-bar" style="width:0%"></div></div>
      </div>

      <div class="m3" id="m3"></div>

      <!-- CAST BUTTON -->
      <div class="action-btns">
        <button onclick="castToFarcaster()" class="action-btn">
          🚀 Cast on Farcaster & Tag @8q
        </button>
      </div>

      <!-- NFT MINT BUTTON -->
      <div class="action-btns">
        <button onclick="mintScoreAsNFT()" class="action-btn">
          🪙 Mint My Score as NFT – Only $0.77
        </button>
        <p class="note">0.00033 ETH • Direct to your wallet</p>
      </div>
    </div>

    <!-- SETTINGS & DATA panes same as before -->
  </div>
</div>

<script>
// === NFT MINT FUNCTION ===
async function mintScoreAsNFT() {
  if (!window.ethereum) return alert("MetaMask install karo!");

  try {
    const provider = new ethers.providers.Web3Provider(window.ethereum);
    await provider.send("eth_requestAccounts", []);
    const signer = provider.getSigner();
    const user = await signer.getAddress();

    const contractAddr = "0x05f68B8741b56508dBc696272BAd25D7cA0F8665";
    const abi = ["function mint(address to) payable"];

    const contract = new ethers.Contract(contractAddr, abi, signer);

    const tx = await contract.mint(user, {
      value: ethers.utils.parseEther("0.00033")
    });

    alert("⏳ Minting chal rahi hai...\nTx: " + tx.hash);

    await tx.wait();
    alert("✅ NFT Mint successful!\nRevenue tere wallet mein aa gaya!");

  } catch (e) {
    if (e.code === 4001) alert("Transaction cancel kiya");
    else alert("Error: " + e.message);
  }
}

// === CAST FUNCTION (screenshot without button) ===
async function castToFarcaster() {
  const scoreArea = document.querySelector('.score-block');
  if (!scoreArea) return alert("Pehle score tab kholo!");

  try {
    const canvas = await html2canvas(scoreArea, {scale: 2, backgroundColor: '#06080f'});
    const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));

    const form = new FormData();
    form.append('file', blob, 'score.png');

    const res = await fetch('https://0x0.st', {method: 'POST', body: form});
    const imgUrl = (await res.text()).trim();

    const tokens = document.getElementById('m-tok').innerText || '—';
    const tier = document.getElementById('m-tier').innerText || '—';
    const usd = document.getElementById('m-usd').innerText || '—';

    const text = encodeURIComponent(
      `🔥 Base Airdrop Simulator mein mera score: ${tokens} BASE (${tier} tier) ≈ ${usd}!\n\n` +
      `Tumhara kitna aayega? Check karo 👇\n\n` +
      `Made by @8q • Base Airdrop Farmer\n` +
      `https://prakash26005.github.io/base-airdrop-simulator/\n\n` +
      imgUrl
    );

    window.open(`https://warpcast.com/~/compose?text=${text}`, '_blank');
  } catch (e) {
    alert("Screenshot error, manual attach kar sakte ho.");
  }
}

// Rest of the script (same as before - run(), renderAll(), etc.)
// ... (pura purana script yahan paste kar sakte ho, main sirf naye functions add kiye hain)

</script>
</body>
